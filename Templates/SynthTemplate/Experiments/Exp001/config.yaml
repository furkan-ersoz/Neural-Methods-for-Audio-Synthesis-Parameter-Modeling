experiment:
  name: "Exp001"
  synth_root: "../../"          # relative from this file to synths/SynthVN/

dataset:
  path: "datasets/S01D01"       # relative from synth_root
  params:
    - attack
    - decay
    - sustain
    - release
    - harmonic2
    - harmonic3
  train_ratio: 0.80
  val_ratio:   0.10
  seed:        42

features:
  type:        mel_spectrogram
  sample_rate: 44100
  n_mels:      128
  n_fft:       2048
  hop_length:  512
  normalize:   true
  cache:       true

model:
  cnn_channels: [32, 64, 128]
  cond_dim:     64
  fc_hidden:    256
  dropout:      0.3

training:
  epochs:        100
  learning_rate: 0.001
  batch_size:    32
  loss:          mse            # mse | log_mse | weighted_mse
  optimizer:     adam           # adam | sgd
  checkpoint:
    save_best: true
    save_last: true
  early_stopping:
    patience: 20

export:
  auto_export:   true           # export ONNX automatically after training
  output_dir:    "exports"      # relative from synth_root → synths/SynthVN/exports/
  filename:      "SynthTemplateModel"
  opset_version: 17
