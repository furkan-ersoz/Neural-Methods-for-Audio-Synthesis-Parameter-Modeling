---

experiment:
  name: "Exp017"
  synth_root: "../../"
  pipeline: "sequenced"
  notes: >
    Exp015'ten türetildi. Amaç: gerçek inference koşullarına yakın eğitim +
    tam ONNX export (door + 12 frame).

    Girdi yapısı (Exp015'ten fark):
      mel_full  = tam karışım ses (row["filename"]) — kullanıcının hedef sesi.
      mel_prev  = bu frame'e kadarki kümülatif render (filename_frameN),
                  training sırasında dropout_p=0.3 ile rastgele sıfırlanır
                  ("perdeli" ipucu). Inference'ta plugin kendi render'ını verir.
      prev_params = önceki frame'lerin tahmin edilen parametreleri (teacher forcing).

    Neden: Exp015'te mel_full kümülatif render, mel_prev bir önceki katmandı;
    bu gerçekçi değildi. Exp017'de model her zaman tam karışımı görür,
    dropout'lu frame renderı ile ipucu alır — plugin inference akışıyla uyumlu.

    Export: auto_export=true → eğitim sonrası her model için ONNX + meta.json
    üretilir (Exp015/exports/).

dataset:
  path: "datasets/S03D17"
  train_ratio: 0.80
  val_ratio:   0.10
  seed:        42

features:
  type:        mel_spectrogram
  sample_rate: 44100
  n_mels:      128
  n_fft:       2048
  hop_length:  512
  cache:       true
  normalize:   true
  num_workers: 4

model:
  model_version:   model011
  pool_mode:       stats
  temporal:        none
  continuous_mode: regression
  audio_channels:  1
  per_param_loss_weight: false
  cnn_channels:    [32, 64, 128]
  cond_dim:        64
  fc_hidden:       256
  dropout:         0.2

conditioning:
  dropout_p:   0.3
  # mel_full = tam mix; mel_prev = bu frame'in kümülatif render'ı (dropout ile perdeli).
  # Inference'ta plugin kendi synth render'ını mel_prev olarak verir.
  main_render: full_frame_hint

door:
  model_file:           model012
  use_lfo_class_weights: true
  bypass_columns:
    - bypass_osc_b
    - bypass_noise
    - bypass_filter
    - bypass_reverb
    - bypass_delay
  lfo_count_column:  active_lfo_count
  lfo_count_classes: 5
  loss_weights:
    bypass:    1.0
    lfo_count: 1.0

frames:
  - name:          osc_a
    model_file:    model011
    frame_index:   1
    always_active: true
    wav_column:    filename_frame01
    params:
      - osc_a_waveform
      - osc_a_warp_amt
      - osc_a_warp_type
      - osc_a_detune
      - osc_a_blend
      - osc_a_pitch_coarse
      - osc_a_pitch_fine
      - osc_a_level
      - osc_a_harmonic2
      - osc_a_harmonic3
    categorical_params: {}

  - name:          osc_b
    model_file:    model011
    frame_index:   2
    bypass_column: bypass_osc_b
    wav_column:    filename_frame02
    params:
      - osc_b_waveform
      - osc_b_warp_amt
      - osc_b_warp_type
      - osc_b_detune
      - osc_b_blend
      - osc_b_pitch_coarse
      - osc_b_pitch_fine
      - osc_b_level
      - osc_b_phase
      - osc_b_semitone_ofs
    categorical_params: {}

  - name:          noise
    model_file:    model011
    frame_index:   3
    bypass_column: bypass_noise
    wav_column:    filename_frame03
    params:
      - noise_color
      - noise_level
      - noise_stereo
    categorical_params: {}

  - name:          filter
    model_file:    model011
    frame_index:   4
    bypass_column: bypass_filter
    wav_column:    filename_frame04
    params:
      - filter_cutoff
      - filter_resonance
      - filter_type
      - filter_drive
      - filter_keytrack
      - filter_env_amt
    categorical_params: {}

  - name:          env1
    model_file:    model011
    frame_index:   5
    always_active: true
    wav_column:    filename_frame05
    params:
      - env1_attack
      - env1_hold
      - env1_decay
      - env1_sustain
      - env1_release
      - env1_atk_curve
      - env1_dec_curve
    categorical_params: {}

  - name:          env2
    model_file:    model011
    frame_index:   6
    bypass_column: bypass_osc_b
    wav_column:    filename_frame06
    params:
      - env2_attack
      - env2_hold
      - env2_decay
      - env2_sustain
      - env2_release
      - env2_atk_curve
      - env2_dec_curve
    categorical_params: {}

  - name:         lfo1
    model_file:   model011
    frame_index:  7
    lfo_index:    1
    wav_column:   filename_frame07
    params:
      - lfo1_rate
      - lfo1_depth
      - lfo1_shape
      - lfo1_target
    categorical_params: {}

  - name:         lfo2
    model_file:   model011
    frame_index:  8
    lfo_index:    2
    wav_column:   filename_frame08
    params:
      - lfo2_rate
      - lfo2_depth
      - lfo2_shape
      - lfo2_target
    categorical_params: {}

  - name:         lfo3
    model_file:   model011
    frame_index:  9
    lfo_index:    3
    wav_column:   filename_frame09
    params:
      - lfo3_rate
      - lfo3_depth
      - lfo3_shape
      - lfo3_target
    categorical_params: {}

  - name:         lfo4
    model_file:   model011
    frame_index:  10
    lfo_index:    4
    wav_column:   filename_frame10
    params:
      - lfo4_rate
      - lfo4_depth
      - lfo4_shape
      - lfo4_target
    categorical_params: {}

  - name:          reverb
    model_file:    model011
    frame_index:   11
    bypass_column: bypass_reverb
    wav_column:    filename_frame11
    params:
      - reverb_size
      - reverb_decay
      - reverb_damping
      - reverb_predelay
      - reverb_mix
      - reverb_width
    categorical_params: {}

  - name:          delay
    model_file:    model011
    frame_index:   12
    bypass_column: bypass_delay
    wav_column:    filename_frame12
    params:
      - delay_time_l
      - delay_time_r
      - delay_feedback
      - delay_filter_cutoff
      - delay_mix
    categorical_params: {}

training:
  epochs:        300
  batch_size:    32
  learning_rate: 0.001
  optimizer:     adam
  num_workers:   4
  lr_scheduler:  plateau
  grad_clip:     1.0
  loss:
    continuous:  mse
    cat_weight:  1.0
  checkpoint:
    save_best: true
    save_last: true
  early_stopping:
    patience: 40

export:
  auto_export:   true
  output_dir:    "exports"
  opset_version: 17
